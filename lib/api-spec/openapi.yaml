openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ai
    description: AI companion endpoints (tree-hole chat, daily report)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai/tree-hole:
    post:
      operationId: treeHoleChat
      tags: [ai]
      summary: Tree-hole companion chat
      description: Send a message to the cat companion. Replies are gentle and ≤20 chinese chars.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreeHoleRequest"
      responses:
        "200":
          description: Reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreeHoleResponse"
  /ai/daily-report:
    post:
      operationId: generateDailyReport
      tags: [ai]
      summary: Generate a personalized daily energy report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DailyReportRequest"
      responses:
        "200":
          description: Report content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReportResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TreeHoleRequest:
      type: object
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 500
      required:
        - message
    TreeHoleResponse:
      type: object
      properties:
        reply:
          type: string
        crisis:
          type: boolean
      required:
        - reply
        - crisis
    DailyReportRequest:
      type: object
      properties:
        date:
          type: string
        recordCount:
          type: integer
        averageEnergy:
          type: number
        minEnergy:
          type: number
        minTime:
          type: string
        maxEnergy:
          type: number
        maxTime:
          type: string
        events:
          type: array
          items:
            type: string
        blindBoxActions:
          type: array
          items:
            type: string
        cyclePhase:
          type: string
      required:
        - date
        - recordCount
        - averageEnergy
        - minEnergy
        - maxEnergy
        - events
        - blindBoxActions
        - cyclePhase
    DailyReportResponse:
      type: object
      properties:
        content:
          type: string
      required:
        - content
